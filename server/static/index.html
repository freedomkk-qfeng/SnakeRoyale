<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnakeRoyale — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a1a;
    --bg-secondary: #12122a;
    --bg-card: #1a1a3e;
    --bg-card-hover: #222255;
    --border: #2a2a5a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-purple: #7c3aed;
    --accent-purple-soft: #a78bfa;
    --accent-rose: #f43f5e;
    --accent-green: #22c55e;
    --accent-amber: #f59e0b;
    --accent-cyan: #06b6d4;
    --glow-purple: 0 0 20px rgba(124, 58, 237, 0.3);
    --glow-rose: 0 0 15px rgba(244, 63, 94, 0.25);
    --glow-green: 0 0 15px rgba(34, 197, 94, 0.25);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
  }

  /* === Header === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-rose));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow-purple);
  }
  .logo svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .title {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-purple-soft), var(--accent-rose));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .header-link,
  .header-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(26, 26, 62, 0.76);
    text-decoration: none;
    transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
  }
  .header-link {
    color: var(--text-secondary);
  }
  .header-link:hover {
    color: var(--text-primary);
    border-color: rgba(124, 58, 237, 0.45);
    background: rgba(34, 34, 85, 0.9);
  }
  .header-chip {
    color: var(--text-primary);
  }
  .repo-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: 999px;
    transition: color 150ms ease, background 150ms ease, transform 150ms ease;
  }
  .repo-link:hover {
    color: var(--text-primary);
    background: rgba(34, 34, 85, 0.72);
  }
  .repo-link:focus-visible {
    outline: 2px solid rgba(167, 139, 250, 0.75);
    outline-offset: 2px;
  }
  .repo-icon {
    width: 19px;
    height: 19px;
    fill: currentColor;
  }
  .chip-label {
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .chip-value {
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-purple-soft);
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: var(--accent-green);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
  }
  .status-badge.disconnected {
    background: rgba(244, 63, 94, 0.1);
    border-color: rgba(244, 63, 94, 0.3);
    color: var(--accent-rose);
  }
  .status-badge.disconnected .status-dot {
    background: var(--accent-rose);
    animation: none;
  }

  /* === Stats Row === */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px 24px;
    flex-shrink: 0;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
  }
  .stat-value.purple { color: var(--accent-purple-soft); }
  .stat-value.green { color: var(--accent-green); }
  .stat-value.amber { color: var(--accent-amber); }
  .stat-value.cyan { color: var(--accent-cyan); }

  /* === Main Layout === */
  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) clamp(360px, 28vw, 420px);
    gap: 14px;
    padding: 0 24px 12px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* === Game Canvas === */
  .game-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .game-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tick-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-secondary);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .canvas-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
  }
  #gameCanvas {
    border-radius: 8px;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
  }

  /* === Sidebar === */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    overflow: hidden;
  }

  /* === Leaderboard === */
  .leaderboard {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .lb-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .lb-list::-webkit-scrollbar { width: 6px; }
  .lb-list::-webkit-scrollbar-track { background: transparent; }
  .lb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .lb-list::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }
  .lb-item {
    display: grid;
    grid-template-columns: 24px 1fr 40px;
    align-items: center;
    gap: 6px;
    padding: 6px 6px;
    border-radius: 8px;
    transition: background 150ms ease;
  }
  .lb-item:hover { background: var(--bg-card-hover); }
  .lb-item + .lb-item { border-top: 1px solid rgba(42, 42, 90, 0.5); }
  .lb-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
  }
  .lb-item:nth-child(1) .lb-rank { color: var(--accent-amber); }
  .lb-item:nth-child(2) .lb-rank { color: #c0c0c0; }
  .lb-item:nth-child(3) .lb-rank { color: #cd7f32; }

  .lb-name-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .lb-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }
  .lb-bar-wrap {
    width: 100%;
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    overflow: hidden;
  }
  .lb-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 300ms ease;
    min-width: 2px;
  }
  .lb-length-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-green);
    text-align: right;
  }
  .lb-header {
    display: grid;
    grid-template-columns: 24px 1fr 40px;
    gap: 8px;
    padding: 0 8px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .lb-header span:nth-child(3) { text-align: right; }

  .leaderboard-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tab-strip {
    display: inline-flex;
    gap: 4px;
    padding: 3px;
    border-radius: 999px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
  }
  .tab-btn {
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 150ms ease, background 150ms ease;
  }
  .tab-btn.active {
    background: rgba(124, 58, 237, 0.18);
    color: var(--accent-purple-soft);
  }
  .tab-panel {
    flex: 1;
    min-height: 0;
    display: none;
    flex-direction: column;
  }
  .tab-panel.active {
    display: flex;
  }
  .tab-caption {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .perf-header,
  .perf-item {
    display: grid;
    grid-template-columns: 24px minmax(0, 1.8fr) 52px 58px 34px;
    gap: 10px;
    align-items: center;
  }
  .perf-header {
    padding: 0 8px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .perf-header span:nth-child(3),
  .perf-header span:nth-child(4),
  .perf-header span:nth-child(5),
  .perf-item span:nth-child(3),
  .perf-item span:nth-child(4),
  .perf-item span:nth-child(5) {
    text-align: right;
  }
  .perf-header span:nth-child(2) {
    text-align: left;
  }
  .perf-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .perf-item {
    padding: 8px 8px;
    border-radius: 8px;
    transition: background 150ms ease;
  }
  .perf-item:hover { background: var(--bg-card-hover); }
  .perf-item + .perf-item { border-top: 1px solid rgba(42, 42, 90, 0.5); }
  .perf-rank,
  .perf-value,
  .perf-rounds {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .perf-rank {
    color: var(--text-muted);
    text-align: center;
  }
  .perf-name-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .perf-name-row {
    display: grid;
    grid-template-columns: 7px minmax(0, 1fr);
    align-items: center;
    gap: 6px;
    width: 100%;
    min-width: 0;
  }
  .perf-name {
    display: block;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-primary);
  }
  .perf-meta {
    display: none;
  }
  .alive-pill {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .alive-pill.live {
    background: var(--accent-green);
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
  }
  .perf-value { color: var(--accent-cyan); }
  .perf-rounds { color: var(--accent-amber); }
  .perf-value,
  .perf-rounds {
    font-variant-numeric: tabular-nums;
  }
  .empty-state {
    padding: 16px 8px;
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
  }

  /* === Event Log === */
  .event-log {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    height: 160px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .log-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    padding: 3px 0;
    line-height: 1.5;
  }
  .log-entry .time { color: var(--text-muted); }
  .log-entry .death { color: var(--accent-rose); }
  .log-entry .join { color: var(--accent-green); }
  .log-entry .eat { color: var(--accent-amber); }

  /* === Snake Color Band (for name labels) === */
  .snake-color {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* === Language Toggle === */
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 12px;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: all 150ms;
  }
  .lang-toggle button.active {
    background: var(--accent-purple);
    color: #fff;
  }

  /* === Responsive === */
  @media (max-width: 1024px) {
    .main { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 640px) {
    .header {
      padding: 10px 14px;
      gap: 10px;
      align-items: flex-start;
      flex-direction: column;
    }
    .header-left,
    .header-right {
      width: 100%;
    }
    .header-left {
      flex-wrap: wrap;
    }
    .header-right {
      justify-content: flex-start;
    }
    .header-link,
    .header-chip {
      max-width: 100%;
    }
    .stats-row {
      padding: 10px 14px;
      grid-template-columns: repeat(2, 1fr);
    }
    .main {
      padding: 0 14px 14px;
    }
    .leaderboard-topbar {
      flex-direction: column;
      align-items: flex-start;
    }
    .tab-strip {
      width: 100%;
    }
    .tab-btn {
      flex: 1;
    }
    .perf-header,
    .perf-item {
      grid-template-columns: 20px minmax(0, 1.4fr) 48px 54px 30px;
      gap: 6px;
    }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M6 7c0-2.2 1.8-4 4-4h4c2.2 0 4 1.8 4 4 0 1.7-1 3.1-2.5 3.7l-4.3 1.8A3 3 0 0 0 9 15.3V17a3 3 0 0 0 3 3h2" />
        <path d="M16.5 7.5h.01" />
        <path d="M14 20h4" />
      </svg>
    </div>
    <span class="title">SnakeRoyale</span>
    <a href="/docs" class="header-link" data-i18n="apiDocs">API 文档</a>
    <a href="/replay" class="header-link" data-i18n="replayViewer">回放中心</a>
    <div class="lang-toggle" id="langToggle">
      <button id="langZh" class="active">中文</button>
      <button id="langEn">EN</button>
    </div>
  </div>
  <div class="header-right">
    <a
      href="https://github.com/freedomkk-qfeng/SnakeRoyale"
      class="repo-link"
      target="_blank"
      rel="noreferrer"
      title="GitHub"
      aria-label="GitHub repository"
    >
      <svg class="repo-icon" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 4.69a7.65 7.65 0 0 1 2.01.27c1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
      </svg>
      <span class="sr-only" data-i18n="repoLink">GitHub 仓库</span>
    </a>
    <div class="header-chip" title="Current project version">
      <span class="chip-label" data-i18n="versionLabel">Version</span>
      <span class="chip-value" id="projectVersion">v--</span>
    </div>
    <div class="status-badge disconnected" id="connStatus">
      <span class="status-dot"></span>
      <span id="connText" data-i18n="connecting">连接中…</span>
    </div>
  </div>
</header>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label" data-i18n="statPlayers">在线玩家</div>
    <div class="stat-value purple" id="statPlayers">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="statAlive">存活蛇</div>
    <div class="stat-value green" id="statAlive">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="statFood">食物数量</div>
    <div class="stat-value amber" id="statFood">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="statRecord">历史最长</div>
    <div class="stat-value cyan" id="statRecord">0</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="statRecordName">-</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Game View -->
  <div class="game-panel">
    <div class="game-panel-header">
      <span class="panel-title" data-i18n="liveGame">实时游戏画面</span>
      <span class="tick-counter" id="tickRate">— tick/s</span>
    </div>
    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="800" height="800"></canvas>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Leaderboard -->
    <div class="leaderboard">
      <div class="leaderboard-topbar">
        <span class="panel-title" data-i18n="leaderboard">排行榜</span>
        <div class="tab-strip" role="tablist" aria-label="Leaderboard views">
          <button class="tab-btn active" id="tabCurrent" data-tab="current" data-i18n="tabCurrent">即时长度</button>
          <button class="tab-btn" id="tabPerformance" data-tab="performance" data-i18n="tabPerformance">生存统计</button>
        </div>
      </div>
      <div class="tab-panel active" id="panelCurrent">
        <div class="tab-caption" data-i18n="tabCurrentHint">按当前蛇身长度排序，适合看实时局势。</div>
        <div class="lb-header">
          <span>#</span><span data-i18n="lbName">名字</span><span data-i18n="lbLength">长度</span>
        </div>
        <div class="lb-list" id="lbList"></div>
      </div>
      <div class="tab-panel" id="panelPerformance">
        <div class="tab-caption" data-i18n="tabPerformanceHint">按平均存活时间排序，同时展示平均长度和样本轮次。</div>
        <div class="perf-header">
          <span>#</span><span data-i18n="perfName">Bot</span><span data-i18n="perfAvgLen">均长</span><span data-i18n="perfAvgTime">均时</span><span data-i18n="perfRounds">轮次</span>
        </div>
        <div class="perf-list" id="perfList"></div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="event-log">
      <div class="game-panel-header">
        <span class="panel-title" data-i18n="eventLog">事件日志</span>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // === i18n ===
  const I18N = {
    zh: {
      apiDocs: 'API 文档',
      replayViewer: '回放中心',
      repoLink: 'GitHub 仓库',
      versionLabel: '版本',
      connecting: '连接中…',
      connected: '已连接',
      disconnected: '已断开',
      statPlayers: '在线玩家',
      statAlive: '存活蛇',
      statFood: '食物数量',
      statRecord: '历史最长',
      liveGame: '实时游戏画面',
      leaderboard: '排行榜',
      tabCurrent: '即时长度',
      tabPerformance: '生存统计',
      tabCurrentHint: '按当前蛇身长度排序，适合看实时局势。',
      tabPerformanceHint: '按平均存活时间排序，同时展示平均长度和样本轮次。',
      lbName: '名字',
      lbLength: '长度',
      perfName: 'Bot',
      perfAvgLen: '均长',
      perfAvgTime: '均时',
      perfRounds: '轮次',
      perfRoundsMeta: '{rounds} 轮样本',
      perfLiveNow: '当前仍存活',
      perfEmpty: '还没有足够样本，等 bot 多跑几轮后这里会更稳定。',
      eventLog: '事件日志',
      logJoined: '加入了游戏',
      logLeft: '一位玩家离开了',
      logScore: '达到 {score} 分！',
      logDashboard: 'Dashboard 已连接到服务器',
    },
    en: {
      apiDocs: 'API Docs',
      replayViewer: 'Replay',
      repoLink: 'GitHub Repository',
      versionLabel: 'Version',
      connecting: 'Connecting…',
      connected: 'Connected',
      disconnected: 'Disconnected',
      statPlayers: 'Players',
      statAlive: 'Alive',
      statFood: 'Food',
      statRecord: 'Record',
      liveGame: 'Live Game',
      leaderboard: 'Leaderboard',
      tabCurrent: 'Current',
      tabPerformance: 'Survival',
      tabCurrentHint: 'Sorted by current body length for fast battlefield reading.',
      tabPerformanceHint: 'Sorted by average survival time with average length and sample count.',
      lbName: 'Name',
      lbLength: 'Length',
      perfName: 'Bot',
      perfAvgLen: 'Avg Len',
      perfAvgTime: 'Avg Time',
      perfRounds: 'Runs',
      perfRoundsMeta: '{rounds} runs',
      perfLiveNow: 'Alive now',
      perfEmpty: 'Not enough samples yet. Let the bots run a bit longer.',
      eventLog: 'Event Log',
      logJoined: 'joined the game',
      logLeft: 'A player left',
      logScore: 'reached {score} pts!',
      logDashboard: 'Dashboard connected to server',
    },
  };

  let currentLang = localStorage.getItem('snakeLang') || 'zh';

  function t(key, params) {
    let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || key;
    if (params) {
      for (const [k, v] of Object.entries(params)) s = s.replace(`{${k}}`, v);
    }
    return s;
  }

  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    // Update dynamic connection status text
    const badge = document.getElementById('connStatus');
    const connText = document.getElementById('connText');
    if (badge.classList.contains('disconnected')) {
      connText.textContent = ws && ws.readyState === WebSocket.CONNECTING ? t('connecting') : t('disconnected');
    } else {
      connText.textContent = t('connected');
    }
  }

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('snakeLang', lang);
    document.getElementById('langZh').className = lang === 'zh' ? 'active' : '';
    document.getElementById('langEn').className = lang === 'en' ? 'active' : '';
    applyI18n();
    if (lastState) {
      updatePerformance(lastState.performance || []);
    }
  }

  // Init toggle buttons
  document.getElementById('langZh').addEventListener('click', () => setLang('zh'));
  document.getElementById('langEn').addEventListener('click', () => setLang('en'));
  document.getElementById('tabCurrent').addEventListener('click', () => setLeaderboardTab('current'));
  document.getElementById('tabPerformance').addEventListener('click', () => setLeaderboardTab('performance'));

  // === Config ===
  const CANVAS_SIZE = 800;
  const FIELD_SIZE = 100;
  const CELL = CANVAS_SIZE / FIELD_SIZE; // 8px per cell

  // Neon snake colors - distinct and vibrant
  const SNAKE_COLORS = [
    '#7c3aed', '#f43f5e', '#06b6d4', '#22c55e', '#f59e0b',
    '#ec4899', '#8b5cf6', '#14b8a6', '#ef4444', '#3b82f6',
    '#d946ef', '#84cc16', '#f97316', '#0ea5e9', '#a855f7',
    '#10b981', '#e11d48', '#6366f1', '#eab308', '#06b6d4',
  ];

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // State
  let snakeColorMap = {};
  let colorIndex = 0;
  let lastState = null;
  let eventLog = [];
  let prevSnakeIds = new Set();
  let prevScores = {};
  let tickTimes = [];
  let perfElements = [];
  let activeLeaderboardTab = 'current';
  let runtimeConfig = { spectator_reconnect_ms: 2000, version: null };

  function updateVersion(version) {
    document.getElementById('projectVersion').textContent = version ? `v${version}` : 'v--';
  }

  function getSnakeColor(id) {
    if (!snakeColorMap[id]) {
      snakeColorMap[id] = SNAKE_COLORS[colorIndex % SNAKE_COLORS.length];
      colorIndex++;
    }
    return snakeColorMap[id];
  }

  // === Canvas Drawing ===
  function drawGame(state) {
    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Grid (subtle)
    ctx.strokeStyle = 'rgba(42, 42, 90, 0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= FIELD_SIZE; i += 10) {
      const p = i * CELL;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, CANVAS_SIZE); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(CANVAS_SIZE, p); ctx.stroke();
    }

    // Foods - small glowing dots
    for (const [fx, fy] of state.foods) {
      const cx = fx * CELL + CELL / 2;
      const cy = fy * CELL + CELL / 2;
      // Glow
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(245, 158, 11, 0.15)';
      ctx.fill();
      // Dot
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = '#f59e0b';
      ctx.fill();
    }

    // Snakes
    for (const snake of state.snakes) {
      if (!snake.alive) continue;
      const color = getSnakeColor(snake.id);

      // Body
      for (let i = snake.body.length - 1; i >= 0; i--) {
        const [bx, by] = snake.body[i];
        const x = bx * CELL;
        const y = by * CELL;

        if (i === 0) {
          // Head - brighter with glow
          ctx.shadowColor = color;
          ctx.shadowBlur = 8;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.roundRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1, 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Eyes
          const dir = snake.direction;
          let ex1, ey1, ex2, ey2;
          const ec = CELL * 0.25;
          const eo = CELL * 0.3;
          if (dir === 'right') { ex1 = x+CELL-ec-1; ey1 = y+eo; ex2 = x+CELL-ec-1; ey2 = y+CELL-eo-ec; }
          else if (dir === 'left') { ex1 = x+1; ey1 = y+eo; ex2 = x+1; ey2 = y+CELL-eo-ec; }
          else if (dir === 'up') { ex1 = x+eo; ey1 = y+1; ex2 = x+CELL-eo-ec; ey2 = y+1; }
          else { ex1 = x+eo; ey1 = y+CELL-ec-1; ex2 = x+CELL-eo-ec; ey2 = y+CELL-ec-1; }
          ctx.fillStyle = '#fff';
          ctx.fillRect(ex1, ey1, ec, ec);
          ctx.fillRect(ex2, ey2, ec, ec);
        } else {
          // Body segment - slightly transparent toward tail
          const alpha = 0.5 + 0.5 * (1 - i / snake.body.length);
          ctx.fillStyle = color;
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.roundRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1, 1.5);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      // Name label above head
      if (snake.body.length > 0) {
        const [hx, hy] = snake.body[0];
        const lx = hx * CELL + CELL / 2;
        const ly = hy * CELL - 4;
        ctx.font = '600 9px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillText(snake.name, lx + 0.5, ly + 0.5);
        ctx.fillStyle = '#fff';
        ctx.fillText(snake.name, lx, ly);
      }
    }
  }

  // === Leaderboard (incremental DOM updates to avoid flicker) ===
  let lbElements = [];  // cached DOM elements

  function setLeaderboardTab(tab) {
    activeLeaderboardTab = tab;
    document.getElementById('tabCurrent').classList.toggle('active', tab === 'current');
    document.getElementById('tabPerformance').classList.toggle('active', tab === 'performance');
    document.getElementById('panelCurrent').classList.toggle('active', tab === 'current');
    document.getElementById('panelPerformance').classList.toggle('active', tab === 'performance');
  }

  function updateLeaderboard(snakes) {
    const sorted = [...snakes].filter(s => s.alive).sort((a, b) => b.length - a.length);
    const lbList = document.getElementById('lbList');
    const maxLen = sorted.length > 0 ? Math.max(...sorted.map(s => s.length)) : 1;

    // Grow/shrink element pool
    while (lbElements.length < sorted.length) {
      const el = createLbRow();
      lbList.appendChild(el.root);
      lbElements.push(el);
    }
    while (lbElements.length > sorted.length) {
      const el = lbElements.pop();
      el.root.remove();
    }

    // Update each row in-place
    for (let i = 0; i < sorted.length; i++) {
      const s = sorted[i];
      const el = lbElements[i];
      const color = getSnakeColor(s.id);
      const pct = Math.max(2, (s.length / maxLen) * 100);

      el.rank.textContent = i + 1;
      el.colorDot.style.background = color;
      el.name.textContent = s.name;
      el.bar.style.width = pct + '%';
      el.bar.style.background = color;
      el.lengthVal.textContent = s.length;
    }
  }

  function createLbRow() {
    const root = document.createElement('div');
    root.className = 'lb-item';

    const rank = document.createElement('span');
    rank.className = 'lb-rank';

    const nameCol = document.createElement('div');
    nameCol.className = 'lb-name-col';

    const nameRow = document.createElement('span');
    nameRow.className = 'lb-name';
    const colorDot = document.createElement('span');
    colorDot.className = 'snake-color';
    nameRow.appendChild(colorDot);
    const nameTxt = document.createTextNode('');
    nameRow.appendChild(nameTxt);

    const barWrap = document.createElement('div');
    barWrap.className = 'lb-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'lb-bar';
    barWrap.appendChild(bar);

    nameCol.appendChild(nameRow);
    nameCol.appendChild(barWrap);

    const lengthVal = document.createElement('span');
    lengthVal.className = 'lb-length-val';

    root.appendChild(rank);
    root.appendChild(nameCol);
    root.appendChild(lengthVal);

    return { root, rank, colorDot, name: nameTxt, bar, lengthVal };
  }

  function updatePerformance(performance) {
    const perfList = document.getElementById('perfList');
    const sorted = [...performance].sort((a, b) => {
      if (b.avg_survival_seconds !== a.avg_survival_seconds) return b.avg_survival_seconds - a.avg_survival_seconds;
      if (b.avg_length !== a.avg_length) return b.avg_length - a.avg_length;
      return a.name.localeCompare(b.name);
    });

    if (sorted.length === 0) {
      perfList.innerHTML = `<div class="empty-state">${t('perfEmpty')}</div>`;
      perfElements = [];
      return;
    }

    while (perfElements.length < sorted.length) {
      const el = createPerfRow();
      perfList.appendChild(el.root);
      perfElements.push(el);
    }
    while (perfElements.length > sorted.length) {
      const el = perfElements.pop();
      el.root.remove();
    }

    for (let i = 0; i < sorted.length; i++) {
      const item = sorted[i];
      const el = perfElements[i];

      el.rank.textContent = i + 1;
      el.alive.classList.toggle('live', item.alive);
      el.name.textContent = item.name || `Bot #${item.id ?? '?'}`;
      const roundsMeta = t('perfRoundsMeta', { rounds: item.rounds });
      el.root.title = item.alive ? `${item.name} · ${roundsMeta} · ${t('perfLiveNow')}` : `${item.name} · ${roundsMeta}`;
      el.avgLen.textContent = item.avg_length.toFixed(1);
      el.avgTime.textContent = `${item.avg_survival_seconds.toFixed(1)}s`;
      el.rounds.textContent = item.rounds;
    }
  }

  function createPerfRow() {
    const root = document.createElement('div');
    root.className = 'perf-item';

    const rank = document.createElement('span');
    rank.className = 'perf-rank';

    const nameCol = document.createElement('div');
    nameCol.className = 'perf-name-col';

    const nameRow = document.createElement('div');
    nameRow.className = 'perf-name-row';
    const alive = document.createElement('span');
    alive.className = 'alive-pill';
    const name = document.createElement('span');
    name.className = 'perf-name';
    nameRow.appendChild(alive);
    nameRow.appendChild(name);

    const meta = document.createElement('span');
    meta.className = 'perf-meta';

    nameCol.appendChild(nameRow);
    nameCol.appendChild(meta);

    const avgLen = document.createElement('span');
    avgLen.className = 'perf-value';

    const avgTime = document.createElement('span');
    avgTime.className = 'perf-value';

    const rounds = document.createElement('span');
    rounds.className = 'perf-rounds';

    root.appendChild(rank);
    root.appendChild(nameCol);
    root.appendChild(avgLen);
    root.appendChild(avgTime);
    root.appendChild(rounds);

    return { root, rank, alive, name, meta, avgLen, avgTime, rounds };
  }

  // === Stats ===
  function updateStats(state) {
    document.getElementById('statPlayers').textContent = state.snakes.length;
    document.getElementById('statAlive').textContent = state.snakes.filter(s => s.alive).length;
    document.getElementById('statFood').textContent = state.foods.length;
    if (state.record) {
      document.getElementById('statRecord').textContent = state.record.length;
      document.getElementById('statRecordName').textContent = state.record.name;
    }
  }

  // === Event Log ===
  function addLogEntry(html) {
    const now = new Date();
    const time = now.toLocaleTimeString('zh-CN', { hour12: false });
    eventLog.unshift({ time, html });
    if (eventLog.length > 50) eventLog.length = 50;
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById('logList');
    el.innerHTML = eventLog.map(e =>
      `<div class="log-entry"><span class="time">${e.time}</span> ${e.html}</div>`
    ).join('');
  }

  function detectEvents(state) {
    const currentIds = new Set(state.snakes.map(s => s.id));

    // New players
    for (const s of state.snakes) {
      if (!prevSnakeIds.has(s.id)) {
        addLogEntry(`<span class="join">▶</span> <b>${esc(s.name)}</b> ${t('logJoined')}`);
      }
    }

    // Disconnected
    for (const id of prevSnakeIds) {
      if (!currentIds.has(id)) {
        addLogEntry(`<span class="death">◀</span> ${t('logLeft')}`);
      }
    }

    // Score changes (ate food)
    for (const s of state.snakes) {
      const prev = prevScores[s.id] || 0;
      if (s.score > prev && prev > 0) {
        // Don't log every eat, only milestones
        if (s.score % 10 === 0) {
          addLogEntry(`<span class="eat">★</span> <b>${esc(s.name)}</b> ${t('logScore', {score: s.score})}`);
        }
      }
    }

    prevSnakeIds = currentIds;
    prevScores = {};
    for (const s of state.snakes) prevScores[s.id] = s.score;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // === Tick Rate Measurement ===
  function measureTickRate() {
    const now = performance.now();
    tickTimes.push(now);
    if (tickTimes.length > 20) tickTimes.shift();
    if (tickTimes.length >= 2) {
      const elapsed = (tickTimes[tickTimes.length - 1] - tickTimes[0]) / 1000;
      const rate = ((tickTimes.length - 1) / elapsed).toFixed(1);
      const configured = lastState && lastState.tick_rate ? lastState.tick_rate : '—';
      document.getElementById('tickRate').textContent = `${rate} obs / ${configured} cfg`;
    }
  }

  // === WebSocket ===
  let ws = null;
  let reconnectTimer = null;

  async function loadRuntimeConfig() {
    try {
      const response = await fetch('/api/runtime-config', { cache: 'no-store' });
      if (!response.ok) return;
      const data = await response.json();
      if (!data || typeof data !== 'object') return;
      runtimeConfig = { ...runtimeConfig, ...data };
      updateVersion(typeof data.version === 'string' ? data.version : null);
      if (typeof data.spectator_reconnect_ms !== 'number' || data.spectator_reconnect_ms <= 0) {
        runtimeConfig.spectator_reconnect_ms = 2000;
      }
    } catch (e) {
      // Keep defaults if config loading fails
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/spectate`);

    ws.onopen = () => {
      const badge = document.getElementById('connStatus');
      badge.className = 'status-badge';
      document.getElementById('connText').textContent = t('connected');
      addLogEntry(`<span class="join">●</span> ${t('logDashboard')}`);
    };

    ws.onmessage = (evt) => {
      try {
        const state = JSON.parse(evt.data);
        if (state.type === 'state') {
          lastState = state;
          measureTickRate();
          drawGame(state);
          updateStats(state);
          updateLeaderboard(state.snakes);
          updatePerformance(state.performance || []);
          detectEvents(state);
        }
      } catch (e) {
        // ignore parse errors
      }
    };

    ws.onclose = () => {
      const badge = document.getElementById('connStatus');
      badge.className = 'status-badge disconnected';
      document.getElementById('connText').textContent = t('disconnected');
      // Reconnect
      if (!reconnectTimer) {
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, runtimeConfig.spectator_reconnect_ms || 2000);
      }
    };

    ws.onerror = () => ws.close();
  }

  // Draw empty field on load (grid lines, no snakes)
  function drawEmptyField() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.strokeStyle = 'rgba(42, 42, 90, 0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= FIELD_SIZE; i += 10) {
      const p = i * CELL;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, CANVAS_SIZE); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(CANVAS_SIZE, p); ctx.stroke();
    }
  }
  drawEmptyField();

  updateVersion(runtimeConfig.version);
  setLang(currentLang);
  setLeaderboardTab(activeLeaderboardTab);
  loadRuntimeConfig().finally(connect);
})();
</script>
</body>
</html>
