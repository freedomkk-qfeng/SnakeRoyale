<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnakeRoyale — API Docs</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a1a;
    --bg-card: #12122a;
    --border: #2a2a5a;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #7c3aed;
    --accent-soft: #a78bfa;
    --accent-rose: #f43f5e;
    --green: #22c55e;
    --amber: #f59e0b;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar-left,
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .topbar-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-rose));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-logo svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .topbar-title {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-soft), var(--accent-rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-link,
  .topbar-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(18, 18, 42, 0.9);
  }
  .topbar-link {
    color: var(--accent-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 150ms;
  }
  .topbar-link:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .topbar-chip {
    color: var(--text);
  }
  .repo-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: 999px;
    transition: color 150ms ease, background 150ms ease;
  }
  .repo-link:hover {
    color: var(--text);
    background: rgba(124, 58, 237, 0.14);
  }
  .repo-link:focus-visible {
    outline: 2px solid rgba(167, 139, 250, 0.75);
    outline-offset: 2px;
  }
  .repo-icon {
    width: 19px;
    height: 19px;
    fill: currentColor;
  }
  .chip-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .chip-value {
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-soft);
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  /* Markdown content styles */
  .md h1 {
    font-size: 32px; font-weight: 700; margin: 0 0 8px;
    background: linear-gradient(135deg, var(--accent-soft), var(--accent-rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .md h2 {
    font-size: 22px; font-weight: 700; margin: 48px 0 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .md h3 { font-size: 17px; font-weight: 600; margin: 32px 0 12px; color: var(--accent-soft); }
  .md h4 { font-size: 15px; font-weight: 600; margin: 24px 0 8px; color: var(--amber); }
  .md p { margin: 12px 0; color: var(--text-secondary); }
  .md ul, .md ol { margin: 12px 0; padding-left: 24px; color: var(--text-secondary); }
  .md li { margin: 4px 0; }
  .md strong { color: var(--text); font-weight: 600; }
  .md code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-soft);
  }
  .md pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 16px 0;
    overflow-x: auto;
  }
  .md pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
  }
  .md th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-soft);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .md td {
    padding: 10px 14px;
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-secondary);
  }
  .md tr:hover td { background: rgba(124, 58, 237, 0.05); }
  .md blockquote {
    border-left: 3px solid var(--amber);
    background: rgba(245, 158, 11, 0.06);
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 0 8px 8px 0;
  }
  .md blockquote p { color: var(--amber); margin: 0; }
  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }
  .md a { color: var(--accent-soft); text-decoration: none; }
  .md a:hover { text-decoration: underline; }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: all 150ms;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  @media (max-width: 720px) {
    .topbar {
      padding: 12px 14px;
    }
    .topbar-left,
    .topbar-right {
      width: 100%;
    }
    .container {
      padding: 28px 16px 64px;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M6 7c0-2.2 1.8-4 4-4h4c2.2 0 4 1.8 4 4 0 1.7-1 3.1-2.5 3.7l-4.3 1.8A3 3 0 0 0 9 15.3V17a3 3 0 0 0 3 3h2" />
        <path d="M16.5 7.5h.01" />
        <path d="M14 20h4" />
      </svg>
    </div>
    <span class="topbar-title" id="topbarTitle">API 文档</span>
  </div>
  <div class="topbar-right">
    <div class="lang-toggle">
      <button id="langZh" class="active">中文</button>
      <button id="langEn">EN</button>
    </div>
    <a
      class="repo-link"
      href="https://github.com/freedomkk-qfeng/SnakeRoyale"
      target="_blank"
      rel="noreferrer"
      title="GitHub"
      aria-label="GitHub repository"
    >
      <svg class="repo-icon" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 4.69a7.65 7.65 0 0 1 2.01.27c1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
      </svg>
      <span class="sr-only" id="repoLabel">GitHub Repository</span>
    </a>
    <div class="topbar-chip">
      <span class="chip-label" id="versionLabel">版本</span>
      <span class="chip-value" id="projectVersion">v--</span>
    </div>
    <a class="topbar-link" href="/" id="topbarBack">← 返回 Dashboard</a>
  </div>
</div>

<div class="container">
  <div class="md" id="content"></div>
</div>

<script>
const mdCache = {};
let currentLang = localStorage.getItem('snakeLang') || 'zh';
let runtimeConfig = { version: null };

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

async function fetchMd(lang) {
  if (mdCache[lang]) return mdCache[lang];
  const resp = await fetch('/api/docs/' + lang);
  const text = await resp.text();
  mdCache[lang] = text;
  return text;
}

async function renderDocs(lang) {
  currentLang = lang;
  localStorage.setItem('snakeLang', lang);
  document.getElementById('topbarTitle').textContent = lang === 'en' ? 'API Docs' : 'API 文档';
  document.getElementById('topbarBack').textContent = lang === 'en' ? '← Dashboard' : '← 返回 Dashboard';
  document.getElementById('versionLabel').textContent = lang === 'en' ? 'Version' : '版本';
  document.getElementById('repoLabel').textContent = lang === 'en' ? 'GitHub Repository' : 'GitHub 仓库';
  document.getElementById('langZh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('langEn').className = lang === 'en' ? 'active' : '';
  const md = await fetchMd(lang);
  document.getElementById('content').innerHTML = marked.parse(md);
}

async function loadRuntimeConfig() {
  try {
    const response = await fetch('/api/runtime-config', { cache: 'no-store' });
    if (!response.ok) return;
    const data = await response.json();
    if (!data || typeof data !== 'object') return;
    runtimeConfig = { ...runtimeConfig, ...data };
    document.getElementById('projectVersion').textContent = data.version ? `v${data.version}` : 'v--';
  } catch (e) {
    // Keep the fallback version chip when runtime config is unavailable.
  }
}

document.getElementById('langZh').addEventListener('click', () => renderDocs('zh'));
document.getElementById('langEn').addEventListener('click', () => renderDocs('en'));
loadRuntimeConfig().finally(() => renderDocs(currentLang));
</script>
</body>
</html>
