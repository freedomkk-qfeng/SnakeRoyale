<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnakeRoyale — API Docs</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a1a;
    --bg-card: #12122a;
    --border: #2a2a5a;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #7c3aed;
    --accent-soft: #a78bfa;
    --accent-rose: #f43f5e;
    --green: #22c55e;
    --amber: #f59e0b;
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-rose));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .topbar-title {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-soft), var(--accent-rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-link {
    margin-left: auto;
    color: var(--accent-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 150ms;
  }
  .topbar-link:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  /* Markdown content styles */
  .md h1 {
    font-size: 32px; font-weight: 700; margin: 0 0 8px;
    background: linear-gradient(135deg, var(--accent-soft), var(--accent-rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .md h2 {
    font-size: 22px; font-weight: 700; margin: 48px 0 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .md h3 { font-size: 17px; font-weight: 600; margin: 32px 0 12px; color: var(--accent-soft); }
  .md h4 { font-size: 15px; font-weight: 600; margin: 24px 0 8px; color: var(--amber); }
  .md p { margin: 12px 0; color: var(--text-secondary); }
  .md ul, .md ol { margin: 12px 0; padding-left: 24px; color: var(--text-secondary); }
  .md li { margin: 4px 0; }
  .md strong { color: var(--text); font-weight: 600; }
  .md code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-soft);
  }
  .md pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 16px 0;
    overflow-x: auto;
  }
  .md pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
  }
  .md th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-soft);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .md td {
    padding: 10px 14px;
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-secondary);
  }
  .md tr:hover td { background: rgba(124, 58, 237, 0.05); }
  .md blockquote {
    border-left: 3px solid var(--amber);
    background: rgba(245, 158, 11, 0.06);
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 0 8px 8px 0;
  }
  .md blockquote p { color: var(--amber); margin: 0; }
  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }
  .md a { color: var(--accent-soft); text-decoration: none; }
  .md a:hover { text-decoration: underline; }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-left: auto;
    margin-right: 12px;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: all 150ms;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">🐍</div>
  <span class="topbar-title" id="topbarTitle">API 文档</span>
  <div class="lang-toggle">
    <button id="langZh" class="active">中文</button>
    <button id="langEn">EN</button>
  </div>
  <a class="topbar-link" href="/" id="topbarBack">← 返回 Dashboard</a>
</div>

<div class="container">
  <div class="md" id="content"></div>
</div>

<script>
const mdCache = {};
let currentLang = localStorage.getItem('snakeLang') || 'zh';

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

async function fetchMd(lang) {
  if (mdCache[lang]) return mdCache[lang];
  const resp = await fetch('/api/docs/' + lang);
  const text = await resp.text();
  mdCache[lang] = text;
  return text;
}

async function renderDocs(lang) {
  currentLang = lang;
  localStorage.setItem('snakeLang', lang);
  document.getElementById('topbarTitle').textContent = lang === 'en' ? 'API Docs' : 'API 文档';
  document.getElementById('topbarBack').textContent = lang === 'en' ? '← Dashboard' : '← 返回 Dashboard';
  document.getElementById('langZh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('langEn').className = lang === 'en' ? 'active' : '';
  const md = await fetchMd(lang);
  document.getElementById('content').innerHTML = marked.parse(md);
}

document.getElementById('langZh').addEventListener('click', () => renderDocs('zh'));
document.getElementById('langEn').addEventListener('click', () => renderDocs('en'));
renderDocs(currentLang);
</script>
</body>
</html>
