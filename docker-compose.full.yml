services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      SNAKE_SERVER_CONFIG: /app/config/server.json
    volumes:
      - ./config/server.json:/app/config/server.json:ro
    ports:
      - "15000:15000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:15000/status', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    volumes:
      - ./config/toxiproxy.json:/config/toxiproxy.json:ro
    ports:
      - "8474:8474"
      - "15001:15001"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: ./client
    command: ["-n", "20", "--server", "http://server:15000", "--prefix", "Bot"]
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  bot_toxic:
    build: ./client
    command: ["-n", "5", "--server", "http://toxiproxy:15001", "--prefix", "LagBot"]
    depends_on:
      toxiproxy:
        condition: service_started
    restart: unless-stopped